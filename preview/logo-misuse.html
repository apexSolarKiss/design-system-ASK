<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card plain" style="min-height:280px; background:linear-gradient(45deg,#D4C6E1,#E2D3F0);">
  <p class="label" style="color:#FFFFFF;">Logo misuse</p>
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
    <div style="aspect-ratio:1; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.32); border-radius:10px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;">
      <img src="../assets/logo-ASK-white.png" style="width:80%; height:auto; transform:rotate(-15deg);" />
      <div style="position:absolute; left:6px; bottom:6px; right:6px; font:500 11px/1 Inter; color:#FFFFFF;">Don't rotate</div>
    </div>
    <div style="aspect-ratio:1; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.32); border-radius:10px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;">
      <img src="../assets/logo-ASK-white.png" style="width:140%; height:auto; transform:scaleX(0.55);" />
      <div style="position:absolute; left:6px; bottom:6px; right:6px; font:500 11px/1 Inter; color:#FFFFFF;">Don't distort</div>
    </div>
    <div style="aspect-ratio:1; background:linear-gradient(45deg,#ff6a00,#ee0979); border-radius:10px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;">
      <img src="../assets/logo-ASK-white.png" style="width:80%; height:auto;" />
      <div style="position:absolute; left:6px; bottom:6px; right:6px; font:500 11px/1 Inter; color:#FFFFFF;">Don't place on off-brand color</div>
    </div>
  </div>
</div>
</body></html>
