<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card plain" style="min-height:200px;">
  <p class="label">Elevation — shadows on light surface</p>
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px; padding:14px 6px 26px;">
    <div style="background:#fff; height:90px; border-radius:14px; box-shadow:0 1px 2px rgba(32,29,38,.06); display:flex; align-items:flex-end; padding:10px;"><span class="mono" style="color:#201D26; opacity:.55;">shadow-sm</span></div>
    <div style="background:#fff; height:90px; border-radius:14px; box-shadow:0 8px 24px rgba(32,29,38,.08); display:flex; align-items:flex-end; padding:10px;"><span class="mono" style="color:#201D26; opacity:.55;">shadow-md</span></div>
    <div style="background:#fff; height:90px; border-radius:14px; box-shadow:0 24px 60px rgba(32,29,38,.12); display:flex; align-items:flex-end; padding:10px;"><span class="mono" style="color:#201D26; opacity:.55;">shadow-lg</span></div>
  </div>
</div></body></html>
