<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card tinted" style="min-height:240px;">
  <p class="label" style="color:rgba(255,255,255,.78);">Form fields</p>
  <div style="display:flex; flex-direction:column; gap:14px; max-width:520px;">
    <label style="display:flex; flex-direction:column; gap:6px;">
      <span style="font:500 11px/1 Inter; letter-spacing:.16em; text-transform:uppercase; color:rgba(255,255,255,.78);">Name</span>
      <input value="Astrid Lindqvist" style="font:300 22px/1.4 Inter; background:transparent; color:#fff; border:none; border-bottom:1px solid rgba(255,255,255,.55); padding:8px 0; outline:none;" />
    </label>
    <label style="display:flex; flex-direction:column; gap:6px;">
      <span style="font:500 11px/1 Inter; letter-spacing:.16em; text-transform:uppercase; color:rgba(255,255,255,.78);">Email</span>
      <input placeholder="you@example.com" style="font:300 22px/1.4 Inter; background:transparent; color:#fff; border:none; border-bottom:1px solid rgba(255,255,255,.55); padding:8px 0; outline:none;" />
    </label>
  </div>
</div></body></html>
