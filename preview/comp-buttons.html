<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card tinted" style="min-height:220px;">
  <p class="label" style="color:rgba(255,255,255,.78);">Buttons — light mode</p>
  <div style="display:flex; flex-wrap:wrap; gap:14px; align-items:center;">
    <button style="font:400 18px/1 Inter; padding:16px 28px; border-radius:999px; background:#fff; color:#201D26; border:none; cursor:pointer; letter-spacing:-.01em;">Primary action</button>
    <button style="font:300 18px/1 Inter; padding:15px 27px; border-radius:999px; background:transparent; color:#fff; border:1px solid rgba(255,255,255,.65); cursor:pointer;">Secondary</button>
    <button style="font:300 18px/1 Inter; padding:15px 27px; border-radius:999px; background:rgba(255,255,255,.18); backdrop-filter:blur(10px); color:#fff; border:1px solid rgba(255,255,255,.3); cursor:pointer;">Ghost / glass</button>
  </div>
  <div style="display:flex; gap:14px; align-items:center;">
    <button style="font:400 14px/1 Inter; padding:10px 18px; border-radius:999px; background:#fff; color:#201D26; border:none;">Small</button>
    <button style="font:400 18px/1 Inter; padding:16px 28px; border-radius:999px; background:#fff; color:#201D26; border:none;">Default</button>
    <button style="font:400 22px/1 Inter; padding:20px 36px; border-radius:999px; background:#fff; color:#201D26; border:none;">Large</button>
  </div>
</div></body></html>
