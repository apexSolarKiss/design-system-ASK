<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card dark" style="min-height:200px;">
  <p class="label" style="color:rgba(212,198,225,.7);">Buttons — dark mode</p>
  <div style="display:flex; flex-wrap:wrap; gap:14px; align-items:center;">
    <button style="font:400 18px/1 Inter; padding:16px 28px; border-radius:999px; background:#D4C6E1; color:#0A090C; border:none; cursor:pointer; letter-spacing:-.01em;">Primary action</button>
    <button style="font:300 18px/1 Inter; padding:15px 27px; border-radius:999px; background:transparent; color:#D4C6E1; border:1px solid rgba(212,198,225,.45); cursor:pointer;">Secondary</button>
    <button style="font:300 18px/1 Inter; padding:15px 27px; border-radius:999px; background:rgba(212,198,225,.08); backdrop-filter:blur(10px); color:#D4C6E1; border:1px solid rgba(212,198,225,.18); cursor:pointer;">Ghost / glass</button>
  </div>
</div></body></html>
