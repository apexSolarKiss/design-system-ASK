<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card plain" style="min-height:260px;">
  <p class="label">Light mode — diagonal gradient</p>
  <div style="height:160px; border-radius:14px; background:linear-gradient(45deg,#D4C6E1 0%,#E2D3F0 100%); position:relative;">
    <div style="position:absolute; left:16px; bottom:14px; font:200 28px/1 Inter; color:#fff;">Text on light</div>
  </div>
  <div style="display:flex; justify-content:space-between; font-family:ui-monospace,Menlo,monospace; font-size:12px; color:#201D26; opacity:.55;">
    <span>↙ #D4C6E1</span>
    <span style="opacity:.55;">45° linear</span>
    <span>#E2D3F0 ↗</span>
  </div>
</div></body></html>
