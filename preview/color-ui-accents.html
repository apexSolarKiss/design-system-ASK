<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card plain" style="min-height:230px;">
  <p class="label">UI accents — muted, secondary use</p>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div style="aspect-ratio:2/1; border-radius:14px; background:#8B79A2;"></div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span style="font:500 12px/1 Inter; color:#201D26;">Plum, muted</span>
        <span class="mono" style="color:#201D26; opacity:.55; font:300 12px/1 'JetBrains Mono',monospace;">#8B79A2</span>
      </div>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div style="aspect-ratio:2/1; border-radius:14px; background:#AE87C2;"></div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span style="font:500 12px/1 Inter; color:#201D26;">Lavender-mid</span>
        <span class="mono" style="color:#201D26; opacity:.55; font:300 12px/1 'JetBrains Mono',monospace;">#AE87C2</span>
      </div>
    </div>
  </div>
  <div style="font:200 14px/1.45 Inter; color:#201D26; opacity:.7; max-width:620px;">Sanctioned for secondary UI elements — borders, dividers, low-emphasis fills. Not for body text or primary surfaces.</div>
</div></body></html>
