<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card plain" style="min-height:240px;">
  <p class="label">Surface — card / container fill</p>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div style="aspect-ratio:2/1; border-radius:14px; background:#BFB3D4; display:flex; align-items:end; padding:14px;">
        <span style="font:500 11px/1 Inter; letter-spacing:.16em; text-transform:uppercase; color:#201D26;">Surface</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span style="font:500 12px/1 Inter; color:#201D26;">Rest</span>
        <span class="mono" style="color:#201D26; opacity:.55; font:300 12px/1 'JetBrains Mono',monospace;">#BFB3D4</span>
      </div>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div style="aspect-ratio:2/1; border-radius:14px; background:#C9BCDE; display:flex; align-items:end; padding:14px;">
        <span style="font:500 11px/1 Inter; letter-spacing:.16em; text-transform:uppercase; color:#201D26;">Hover</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span style="font:500 12px/1 Inter; color:#201D26;">Hover</span>
        <span class="mono" style="color:#201D26; opacity:.55; font:300 12px/1 'JetBrains Mono',monospace;">#C9BCDE</span>
      </div>
    </div>
  </div>
  <div style="font:200 14px/1.45 Inter; color:#201D26; opacity:.7; max-width:620px;">Used for card and container fills when a surface needs more presence than a glass overlay can carry.</div>
</div></body></html>
