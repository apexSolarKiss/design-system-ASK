<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card plain" style="min-height:260px;">
  <p class="label">Voice — do / don't</p>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div style="font:500 11px/1 Inter; letter-spacing:.18em; text-transform:uppercase; color:#201D26;">Yes</div>
      <div style="font:200 20px/1.35 Inter; color:#201D26;">The system uses Inter for interface.</div>
      <div style="font:200 20px/1.35 Inter; color:#201D26;">Two diagonal gradients. Five core colors.</div>
      <div style="font:200 20px/1.35 Inter; color:#201D26;">State is expressed through weight and opacity.</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div style="font:500 11px/1 Inter; letter-spacing:.18em; text-transform:uppercase; color:#201D26; opacity:.4;">No</div>
      <div style="font:200 20px/1.35 Inter; color:#201D26; opacity:.4; text-decoration:line-through;">Revolutionary AI-powered platform 🚀</div>
      <div style="font:200 20px/1.35 Inter; color:#201D26; opacity:.4; text-decoration:line-through;">We've built an industry-leading kit</div>
      <div style="font:200 20px/1.35 Inter; color:#201D26; opacity:.4; text-decoration:line-through;">Introducing: the ASK design tokens!</div>
    </div>
  </div>
</div></body></html>
