<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card tinted" style="min-height:240px;">
  <p class="label" style="color:rgba(255,255,255,.78);">Layout — 12-col, 96px outer margin</p>
  <div style="position:relative; height:160px; border:1px solid rgba(255,255,255,.45); border-radius:10px; padding:14px;">
    <div style="display:grid; grid-template-columns:repeat(12,1fr); gap:8px; height:100%;">
      <div style="background:rgba(255,255,255,.22); border-radius:4px;"></div><div style="background:rgba(255,255,255,.22); border-radius:4px;"></div><div style="background:rgba(255,255,255,.22); border-radius:4px;"></div><div style="background:rgba(255,255,255,.22); border-radius:4px;"></div><div style="background:rgba(255,255,255,.22); border-radius:4px;"></div><div style="background:rgba(255,255,255,.22); border-radius:4px;"></div><div style="background:rgba(255,255,255,.22); border-radius:4px;"></div><div style="background:rgba(255,255,255,.22); border-radius:4px;"></div><div style="background:rgba(255,255,255,.22); border-radius:4px;"></div><div style="background:rgba(255,255,255,.22); border-radius:4px;"></div><div style="background:rgba(255,255,255,.22); border-radius:4px;"></div><div style="background:rgba(255,255,255,.22); border-radius:4px;"></div>
    </div>
    <div style="position:absolute; top:50%; left:14px; transform:translateY(-50%); writing-mode:vertical-rl; font:500 10px/1 Inter; letter-spacing:.18em; color:rgba(255,255,255,.8);">96PX</div>
  </div>
</div></body></html>
