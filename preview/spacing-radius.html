<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card plain" style="min-height:200px;">
  <p class="label">Corner radii</p>
  <div style="display:grid; grid-template-columns:repeat(6,1fr); gap:12px;">
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:88px; height:88px; background:linear-gradient(45deg,#D4C6E1,#E2D3F0); border-radius:4px;"></div>
        <div style="font:500 12px/1 Inter; color:#201D26;">xs</div>
        <div class="mono" style="color:#201D26; opacity:.4;">4px</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:88px; height:88px; background:linear-gradient(45deg,#D4C6E1,#E2D3F0); border-radius:8px;"></div>
        <div style="font:500 12px/1 Inter; color:#201D26;">sm</div>
        <div class="mono" style="color:#201D26; opacity:.4;">8px</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:88px; height:88px; background:linear-gradient(45deg,#D4C6E1,#E2D3F0); border-radius:14px;"></div>
        <div style="font:500 12px/1 Inter; color:#201D26;">md</div>
        <div class="mono" style="color:#201D26; opacity:.4;">14px</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:88px; height:88px; background:linear-gradient(45deg,#D4C6E1,#E2D3F0); border-radius:22px;"></div>
        <div style="font:500 12px/1 Inter; color:#201D26;">lg</div>
        <div class="mono" style="color:#201D26; opacity:.4;">22px</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:88px; height:88px; background:linear-gradient(45deg,#D4C6E1,#E2D3F0); border-radius:32px;"></div>
        <div style="font:500 12px/1 Inter; color:#201D26;">xl</div>
        <div class="mono" style="color:#201D26; opacity:.4;">32px</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:88px; height:88px; background:linear-gradient(45deg,#D4C6E1,#E2D3F0); border-radius:999px;"></div>
        <div style="font:500 12px/1 Inter; color:#201D26;">pill</div>
        <div class="mono" style="color:#201D26; opacity:.4;">999</div>
      </div>
  </div>
</div></body></html>
