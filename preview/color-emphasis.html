<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card dark" style="min-height:240px;">
  <p class="label" style="color:rgba(212,198,225,.7);">Emphasis accents — sparing, three only</p>
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:14px;">
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div style="aspect-ratio:1; border-radius:14px; background:#FF00FF; box-shadow:0 0 60px rgba(255,0,255,.35);"></div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span style="font:500 12px/1 Inter; color:#D4C6E1;">Magenta</span>
        <span class="mono" style="color:#D4C6E1; opacity:.6; font:300 12px/1 'JetBrains Mono',monospace;">#FF00FF</span>
      </div>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div style="aspect-ratio:1; border-radius:14px; background:#AA40FF; box-shadow:0 0 60px rgba(170,64,255,.35);"></div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span style="font:500 12px/1 Inter; color:#D4C6E1;">Violet</span>
        <span class="mono" style="color:#D4C6E1; opacity:.6; font:300 12px/1 'JetBrains Mono',monospace;">#AA40FF</span>
      </div>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div style="aspect-ratio:1; border-radius:14px; background:#00BEFF; box-shadow:0 0 60px rgba(0,190,255,.35);"></div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span style="font:500 12px/1 Inter; color:#D4C6E1;">Cyan</span>
        <span class="mono" style="color:#D4C6E1; opacity:.6; font:300 12px/1 'JetBrains Mono',monospace;">#00BEFF</span>
      </div>
    </div>
  </div>
  <div style="font:200 14px/1.45 Inter; color:#D4C6E1; opacity:.78; max-width:620px;">Three accents, sanctioned for sparing emphasis. Not an invitation to introduce other hues.</div>
</div></body></html>
