<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card tinted" style="min-height:220px;">
  <p class="label" style="color:rgba(255,255,255,.78);">Badges & chips — on light gradient</p>
  <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
    <span style="font:500 12px/1 Inter; letter-spacing:.14em; text-transform:uppercase; padding:8px 14px; border-radius:999px; background:#FFFFFF; color:#201D26;">New</span>
    <span style="font:500 12px/1 Inter; letter-spacing:.14em; text-transform:uppercase; padding:8px 14px; border-radius:999px; background:#201D26; color:#D4C6E1;">Featured</span>
    <span style="font:500 12px/1 Inter; letter-spacing:.14em; text-transform:uppercase; padding:8px 14px; border-radius:999px; background:transparent; color:#FFFFFF; border:1px solid rgba(255,255,255,.65);">Draft</span>
    <span style="font:500 12px/1 Inter; letter-spacing:.14em; text-transform:uppercase; padding:8px 14px; border-radius:999px; background:rgba(255,255,255,.22); color:#FFFFFF; backdrop-filter:blur(8px);">Editorial</span>
  </div>
  <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
    <span style="font:300 16px/1 Inter; padding:10px 16px; border-radius:999px; background:rgba(255,255,255,.18); color:#FFFFFF; border:1px solid rgba(255,255,255,.32);">Studio</span>
    <span style="font:300 16px/1 Inter; padding:10px 16px; border-radius:999px; background:rgba(255,255,255,.18); color:#FFFFFF; border:1px solid rgba(255,255,255,.32);">Film</span>
    <span style="font:300 16px/1 Inter; padding:10px 16px; border-radius:999px; background:rgba(255,255,255,.18); color:#FFFFFF; border:1px solid rgba(255,255,255,.32);">Stills</span>
    <span style="font:300 16px/1 Inter; padding:10px 16px; border-radius:999px; background:rgba(255,255,255,.18); color:#FFFFFF; border:1px solid rgba(255,255,255,.32);">Sound</span>
  </div>
</div>
</body></html>
