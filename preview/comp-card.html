<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card tinted" style="min-height:300px;">
  <p class="label" style="color:rgba(255,255,255,.78);">Glass card on gradient</p>
  <div style="background:rgba(255,255,255,.14); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.32); border-radius:22px; padding:26px; box-shadow:0 24px 60px rgba(32,29,38,.12);">
    <div style="font:500 11px/1 Inter; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.78); margin-bottom:14px;">Featured</div>
    <div style="font:400 32px/1.1 Inter; color:#fff; letter-spacing:-.02em; margin-bottom:10px;">Inter Regular at forty-eight.</div>
    <div style="font:200 18px/1.4 Inter; color:rgba(255,255,255,.86); margin-bottom:20px;">Cards use white at 14% with blur, hairline border at 32% and the long soft shadow.</div>
    <div style="display:flex; gap:12px;">
      <span style="font:400 14px/1 Inter; padding:8px 14px; border-radius:999px; background:rgba(255,255,255,.22); color:#fff;">Editorial</span>
      <span style="font:400 14px/1 Inter; padding:8px 14px; border-radius:999px; background:rgba(255,255,255,.22); color:#fff;">2026</span>
    </div>
  </div>
</div></body></html>
